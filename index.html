<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <div class="board-wrapper">
      <canvas id="game-board" width="300" height="600" aria-label="게임 보드"></canvas>

      <div id="game-over-overlay" class="game-over-overlay hidden" aria-hidden="true">
        <p class="game-over-text">게임 오버</p>
        <button id="restart-button" type="button">다시 시작</button>
      </div>
    </div>

    <aside class="side-panel">
      <section class="info-box">
        <h2 class="info-title">점수</h2>
        <p class="info-value" id="score">0</p>
      </section>

      <section class="info-box">
        <h2 class="info-title">레벨</h2>
        <p class="info-value" id="level">1</p>
      </section>

      <section class="info-box">
        <h2 class="info-title">다음</h2>
        <canvas id="next-piece" width="120" height="120" aria-label="다음 블록"></canvas>
      </section>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
